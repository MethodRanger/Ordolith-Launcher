appId: dev.methodranger.ordolith
productName: Ordolith
copyright: Copyright © 2026 MethodRanger

directories:
  output: release/${version}
  buildResources: build

files:
  - out/**/*
  - package.json

extraResources:
  - from: build/icons
    to: icons

# Bundle native/runtime node deps (e.g. adm-zip) with the app.
asar: true
npmRebuild: false

# ---- Windows ------------------------------------------------------------
win:
  icon: build/icons/ordolith.ico
  target:
    - target: nsis
      arch:
        - x64
        - arm64
  artifactName: ${productName}-${version}-win-${arch}.${ext}

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: false

# ---- macOS --------------------------------------------------------------
mac:
  icon: build/icons/ordolith.icns
  category: public.app-category.games
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  artifactName: ${productName}-${version}-mac-${arch}.${ext}
  # Ad-hoc signing by default; supply identity + notarization in CI.
  hardenedRuntime: true
  gatekeeperAssess: false

# ---- Linux --------------------------------------------------------------
linux:
  icon: build/icons/ordolith-512.png
  category: Game
  target:
    - AppImage
    - deb
    - tar.gz
  maintainer: MethodRanger
  artifactName: ${productName}-${version}-linux-${arch}.${ext}
