      <feColorMatrix in="blur" values="0 0 0 0 0.36 0 0 0 0 0.66 0 0 0 0 0.94 0 0 0 .34 0"/>
    </filter>
  </defs>
  <rect width="128" height="128" rx="28" fill="url(#tile)"/>
  <circle cx="98" cy="31" r="23" fill="#5B9DF0" opacity=".045"/>
  <circle cx="28" cy="99" r="22" fill="#5B9DF0" opacity=".045"/>
  <path d="M64 38 91 52.5 64 68 37 52.5 64 38Z" fill="#5B9DF0" opacity=".34" filter="url(#glow)"/>
  <path d="M64 38 91 52.5 64 68 37 52.5 64 38Z" fill="url(#top)"/>
  <path d="M37 52.5 64 68v31L37 83.5v-31Z" fill="url(#left)"/>
  <path d="M91 52.5 64 68v31l27-15.5v-31Z" fill="url(#right)"/>
  <path d="M38.5 52.4 64 66.9l25.5-14.5" fill="none" stroke="#D5FFFA" stroke-opacity=".36" stroke-width="1"/>
